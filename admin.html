<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - Menu-as-a-Service</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Tajawal', sans-serif; background: #f5f5f5; color: #333; }
  
  .header {
    background: linear-gradient(135deg, #D8482A 0%, #B8391F 100%);
    color: white;
    padding: 20px;
    text-align: center;
  }
  
  .header h1 { font-size: 32px; margin-bottom: 10px; }
  
  .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
  
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .stat-card {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-left: 4px solid #D8482A;
  }
  
  .stat-card h3 { color: #D8482A; margin-bottom: 10px; font-size: 14px; }
  .stat-card .value { font-size: 32px; font-weight: bold; color: #333; }
  
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .chart-container {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  
  .chart-container h3 { margin-bottom: 20px; color: #D8482A; }
  
  .table-container {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    overflow-x: auto;
  }
  
  .table-container h3 { margin-bottom: 20px; color: #D8482A; }
  
  table {
    width: 100%;
    border-collapse: collapse;
  }
  
  table th {
    background: #D8482A;
    color: white;
    padding: 12px;
    text-align: right;
    font-weight: 600;
  }
  
  table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
  }
  
  table tr:hover { background: #f9f9f9; }
  
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  
  .badge-delivery { background: #E3F2FD; color: #1976D2; }
  .badge-dine-in { background: #F3E5F5; color: #7B1FA2; }
  .badge-takeaway { background: #E8F5E9; color: #388E3C; }
  
  .controls {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .controls input, .controls select {
    padding: 10px 15px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-family: 'Tajawal', sans-serif;
  }
  
  .controls button {
    padding: 10px 20px;
    background: #D8482A;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
  }
  
  .controls button:hover { background: #B8391F; }
  
  .loading {
    text-align: center;
    padding: 40px;
    color: #999;
  }
  
  .error {
    background: #FFEBEE;
    color: #C62828;
    padding: 15px;
    border-radius: 5px;
    margin-bottom: 20px;
  }
  
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
    .controls { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📊 لوحة التحكم - Menu-as-a-Service</h1>
  <p>مراقبة الطلبات والإحصائيات</p>
</div>

<div class="container">
  <div class="controls">
    <input type="text" id="restaurantFilter" placeholder="ابحث عن المطعم...">
    <select id="dateFilter">
      <option value="">-- كل التواريخ --</option>
      <option value="today">اليوم</option>
      <option value="week">هذا الأسبوع</option>
      <option value="month">هذا الشهر</option>
    </select>
    <button onclick="refreshData()">🔄 تحديث</button>
    <button onclick="exportToCSV()">📥 تحميل CSV</button>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="loading">جاري التحميل...</div>
  </div>

  <div class="charts-grid">
    <div class="chart-container">
      <h3>📈 الطلبات حسب النوع</h3>
      <canvas id="orderTypeChart"></canvas>
    </div>
    <div class="chart-container">
      <h3>🍔 أكثر الأصناف مبيعاً</h3>
      <canvas id="topItemsChart"></canvas>
    </div>
  </div>

  <div class="table-container">
    <h3>📋 آخر الطلبات</h3>
    <table id="ordersTable">
      <thead>
        <tr>
          <th>الملاحظات</th>
          <th>المجموع</th>
          <th>الطلبات</th>
          <th>نوع الطلب</th>
          <th>المنطقة</th>
          <th>الهاتف</th>
          <th>اسم الزبون</th>
          <th>الوقت</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="8" class="loading">جاري التحميل...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const CONFIG = {
    spreadsheetId: '1pJXQAJFC0G4x5L4ci2mZ6ZB1rHOPMRNQRuV7t_mtFhg',
    apiKey: 'YOUR_GOOGLE_API_KEY',
    restaurantName: 'كرنش برجر',
  };

  const SAMPLE_DATA = [
    {
      timestamp: new Date().toLocaleString('ar-IQ'),
      customerName: 'محمد أحمد',
      customerPhone: '07731260831',
      area: 'الرصافة',
      orderType: 'توصيل',
      items: 'برجر كلاسيكي × 2, بطاطس مقلية × 1',
      totalPrice: 58,
      notes: 'بدون خس'
    },
    {
      timestamp: new Date(Date.now() - 3600000).toLocaleString('ar-IQ'),
      customerName: 'فاطمة علي',
      customerPhone: '07812345678',
      area: 'الكرخ',
      orderType: 'صالة',
      items: 'برجر مشروم × 1, كوكا كولا × 2',
      totalPrice: 38,
      notes: '-'
    },
    {
      timestamp: new Date(Date.now() - 7200000).toLocaleString('ar-IQ'),
      customerName: 'علي حسن',
      customerPhone: '07912345678',
      area: '-',
      orderType: 'سفري',
      items: 'برجر دجاج × 3, ناجتس الدجاج × 2',
      totalPrice: 82,
      notes: 'سريع من فضلك'
    }
  ];

  let allOrders = [];
  let orderTypeChart = null;
  let topItemsChart = null;

  function initDashboard() {
    loadOrders();
    renderCharts();
  }

  function loadOrders() {
    allOrders = SAMPLE_DATA;
    renderOrdersTable();
    updateStats();
  }

  function renderOrdersTable() {
    const tbody = document.getElementById('ordersBody');
    let html = '';

    allOrders.forEach(order => {
      const badgeClass = order.orderType === 'توصيل' ? 'badge-delivery' : 
                         order.orderType === 'صالة' ? 'badge-dine-in' : 'badge-takeaway';
      
      html += `
        <tr>
          <td><LaTex>${order.notes}</td>
          <td>$</LaTex>{order.totalPrice} دينار</td>
          <td><LaTex>${order.items}</td>
          <td><span class="badge $</LaTex>{badgeClass}"><LaTex>${order.orderType}</span></td>
          <td>$</LaTex>{order.area}</td>
          <td><LaTex>${order.customerPhone}</td>
          <td>$</LaTex>{order.customerName}</td>
          <td>${order.timestamp}</td>
        </tr>
      `;
    });

    tbody.innerHTML = html || '<tr><td colspan="8" class="loading">لا توجد طلبات</td></tr>';
  }

  function updateStats() {
    const statsGrid = document.getElementById('statsGrid');
    
    const totalOrders = allOrders.length;
    const totalRevenue = allOrders.reduce((sum, order) => sum + order.totalPrice, 0);
    const deliveryOrders = allOrders.filter(o => o.orderType === 'توصيل').length;
    const avgOrderValue = totalOrders > 0 ? (totalRevenue / totalOrders).toFixed(2) : 0;

    statsGrid.innerHTML = `
      <div class="stat-card">
        <h3>📦 إجمالي الطلبات</h3>
        <div class="value">${totalOrders}</div>
      </div>
      <div class="stat-card">
        <h3>💰 إجمالي الإيرادات</h3>
        <div class="value"><LaTex>${totalRevenue} د.ع</div>
      </div>
      <div class="stat-card">
        <h3>🚚 طلبات التوصيل</h3>
        <div class="value">$</LaTex>{deliveryOrders}</div>
      </div>
      <div class="stat-card">
        <h3>📊 متوسط الطلب</h3>
        <div class="value">${avgOrderValue} د.ع</div>
      </div>
    `;
  }

  function renderCharts() {
    renderOrderTypeChart();
    renderTopItemsChart();
  }

  function renderOrderTypeChart() {
    const ctx = document.getElementById('orderTypeChart').getContext('2d');
    const types = {};

    allOrders.forEach(order => {
      types[order.orderType] = (types[order.orderType] || 0) + 1;
    });

    if (orderTypeChart) orderTypeChart.destroy();

    orderTypeChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: Object.keys(types),
        datasets: [{
          data: Object.values(types),
          backgroundColor: ['#D8482A', '#4285F4', '#34A853']
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom' }
        }
      }
    });
  }

  function renderTopItemsChart() {
    const ctx = document.getElementById('topItemsChart').getContext('2d');
    const items = {};

    allOrders.forEach(order => {
      const orderItems = order.items.split(',');
      orderItems.forEach(item => {
        const trimmed = item.trim();
        items[trimmed] = (items[trimmed] || 0) + 1;
      });
    });

    const topItems = Object.entries(items)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5);

    if (topItemsChart) topItemsChart.destroy();

    topItemsChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: topItems.map(item => item[0]),
        datasets: [{
          label: 'عدد المبيعات',
          data: topItems.map(item => item[1]),
          backgroundColor: '#D8482A'
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: {
          legend: { display: false }
        }
      }
    });
  }

  function refreshData() {
    loadOrders();
    renderCharts();
    alert('تم تحديث البيانات');
  }

  function exportToCSV() {
    let csv = 'الوقت,اسم الزبون,الهاتف,المنطقة,نوع الطلب,الطلبات,المجموع,الملاحظات\n';
    
    allOrders.forEach(order => {
      csv += `"${order.timestamp}","<LaTex>${order.customerName}","$</LaTex>{order.customerPhone}","<LaTex>${order.area}","$</LaTex>{order.orderType}","<LaTex>${order.items}","$</LaTex>{order.totalPrice}","${order.notes}"\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'orders.csv';
    link.click();
  }

  window.addEventListener('load', initDashboard);
</script>

</body>
</html>
