<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - Menu-as-a-Service</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Tajawal', sans-serif; background: #f5f5f5; color: #333; }
  
  .header {
    background: linear-gradient(135deg, #D8482A 0%, #B8391F 100%);
    color: white;
    padding: 20px;
    text-align: center;
  }
  
  .header h1 { font-size: 32px; margin-bottom: 10px; }
  
  .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
  
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .stat-card {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-left: 4px solid #D8482A;
  }
  
  .stat-card h3 { color: #D8482A; margin-bottom: 10px; font-size: 14px; }
  .stat-card .value { font-size: 32px; font-weight: bold; color: #333; }
  
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .chart-container {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  
  .chart-container h3 { margin-bottom: 20px; color: #D8482A; }
  
  .table-container {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    overflow-x: auto;
  }
  
  .table-container h3 { margin-bottom: 20px; color: #D8482A; }
  
  table {
    width: 100%;
    border-collapse: collapse;
  }
  
  table th {
    background: #D8482A;
    color: white;
    padding: 12px;
    text-align: right;
    font-weight: 600;
  }
  
  table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
  }
  
  table tr:hover { background: #f9f9f9; }
  
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  
  .badge-delivery { background: #E3F2FD; color: #1976D2; }
  .badge-dine-in { background: #F3E5F5; color: #7B1FA2; }
  .badge-takeaway { background: #E8F5E9; color: #388E3C; }
  
  .controls {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .controls input, .controls select {
    padding: 10px 15px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-family: 'Tajawal', sans-serif;
  }
  
  .controls button {
    padding: 10px 20px;
    background: #D8482A;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
  }
  
  .controls button:hover { background: #B8391F; }
  
  .loading {
    text-align: center;
    padding: 40px;
    color: #999;
  }
  
  .error {
    background: #FFEBEE;
    color: #C62828;
    padding: 15px;
    border-radius: 5px;
    margin-bottom: 20px;
  }
  
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
    .controls { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📊 لوحة التحكم - Menu-as-a-Service</h1>
  <p>مراقبة الطلبات والإحصائيات</p>
</div>

<div class="container">
  <!-- ===== عناصر التحكم ===== -->
  <div class="controls">
    <input type="text" id="restaurantFilter" placeholder="ابحث عن المطعم...">
    <select id="dateFilter">
      <option value="">-- كل التواريخ --</option>
      <option value="today">اليوم</option>
      <option value="week">هذا الأسبوع</option>
      <option value="month">هذا الشهر</option>
    </select>
    <button onclick="refreshData()">🔄 تحديث</button>
    <button onclick="exportToCSV()">📥 تحميل CSV</button>
  </div>

  <!-- ===== الإحصائيات ===== -->
  <div class="stats-grid" id="statsGrid">
    <div class="loading">جاري التحميل...</div>
  </div>

  <!-- ===== الرسوم البيانية ===== -->
  <div class="charts-grid">
    <div class="chart-container">
      <h3>📈 الطلبات حسب النوع</h3>
      <canvas id="orderTypeChart"></canvas>
    </div>
    <div class="chart-container">
      <h3>🍔 أكثر الأصناف مبيعاً</h3>
      <canvas id="topItemsChart"></canvas>
    </div>
  </div>

  <!-- ===== جدول الطلبات ===== -->
  <div class="table-container">
    <h3>📋 آخر الطلبات</h3>
    <table id="ordersTable">
      <thead>
        <tr>
          <th>الملاحظات</th>
          <th>المجموع</th>
          <th>الطلبات</th>
          <th>نوع الطلب</th>
          <th>المنطقة</th>
          <th>الهاتف</th>
          <th>اسم الزبون</th>
          <th>الوقت</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="8" class="loading">جاري التحميل...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // ===== متغيرات الإعدادات =====
  const CONFIG = {
    spreadsheetId: '1pJXQAJFC0G4x5L4ci2mZ6ZB1rHOPMRNQRuV7t_mtFhg',
    apiKey: 'YOUR_GOOGLE_API_KEY',
    restaurantName: 'كرنش برجر', // غيّره حسب المطعم
  };

  // ===== بيانات مثال (للاختبار)
  const SAMPLE_DATA = [
    {
      timestamp: new Date().toLocaleString('ar-IQ'),
      customerName: 'محمد أحمد',
      customerPhone: '07731260831',
      area: 'الرصافة',
      orderType: 'توصيل',
      items: 'برجر كلاسيكي × 2, بطاطس مقلية × 1',
      totalPrice: 58,
      notes: 'بدون خس'
    },
    {
      timestamp: new Date(Date.now() - 3600000).toLocaleString('ar-IQ'),
      customerName: 'فاطمة علي',
      customerPhone: '07812345678',
      area: 'الكرخ',
      orderType: 'صالة',
      items: 'برجر مشروم × 1, كوكا كولا × 2',
      totalPrice: 38,
      notes: '-'
    },
    {
      timestamp: new Date(Date.now() - 7200000).toLocaleString('ar-IQ'),
      customerName: 'علي حسن',
      customerPhone: '07912345678',
      area: '-',
      orderType: 'سفري',
      items: 'برجر دجاج × 3, ناجتس الدجاج × 2',
      totalPrice: 82,
      notes: 'سريع من فضلك'
    }
  ];

  let allOrders = [];
  let orderTypeChart = null;
  let topItemsChart = null;

  // ===== تحميل البيانات =====
  async function loadData() {
    try {
      // في الواقع، ستحمل من Google Sheets API
      // للآن، نستخدم البيانات المثال
      allOrders = SAMPLE_DATA;
      
      renderStats();
      renderCharts();
      renderTable();
    } catch (error) {
      console.error('Error loading data:', error);
      document.getElementById('statsGrid').innerHTML = '<div class="error">خطأ في تحميل البيانات</div>';
    }
  }

  // ===== عرض الإحصائيات =====
  function renderStats() {
    const stats = calculateStats();
    
    const html = `
      <div class="stat-card">
        <h3>👥 إجمالي الطلبات</h3>
        <div class="value">${stats.totalOrders}</div>
      </div>
      <div class="stat-card">
        <h3>💰 إجمالي الإيرادات</h3>
        <div class="value">${stats.totalRevenue} دينار</div>
      </div>
      <div class="stat-card">
        <h3>🚗 طلبات التوصيل</h3>
        <div class="value">${stats.deliveryOrders}</div>
      </div>
      <div class="stat-card">
        <h3>🪑 طلبات الصالة</h3>
        <div class="value">${stats.dineInOrders}</div>
      </div>
      <div class="stat-card">
        <h3>📦 طلبات السفري</h3>
        <div class="value">${stats.takeAwayOrders}</div>
      </div>
      <div class="stat-card">
        <h3>📊 متوسط الطلب</h3>
        <div class="value">${Math.round(stats.totalRevenue / stats.totalOrders)} دينار</div>
      </div>
    `;
    
    document.getElementById('statsGrid').innerHTML = html;
  }

  // ===== حساب الإحصائيات =====
  function calculateStats() {
    const stats = {
      totalOrders: allOrders.length,
      totalRevenue: 0,
      deliveryOrders: 0,
      dineInOrders: 0,
      takeAwayOrders: 0,
    };

    allOrders.forEach(order => {
      stats.totalRevenue += order.totalPrice;
      if (order.orderType === 'توصيل') stats.deliveryOrders++;
      else if (order.orderType === 'صالة') stats.dineInOrders++;
      else if (order.orderType === 'سفري') stats.takeAwayOrders++;
    });

    return stats;
  }

  // ===== عرض الرسوم البيانية =====
  function renderCharts() {
    renderOrderTypeChart();
    renderTopItemsChart();
  }

  // ===== رسم بياني: الطلبات حسب النوع =====
  function renderOrderTypeChart() {
    const stats = calculateStats();
    const ctx = document.getElementById('orderTypeChart').getContext('2d');
    
    if (orderTypeChart) orderTypeChart.destroy();
    
    orderTypeChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['توصيل', 'صالة', 'سفري'],
        datasets: [{
          data: [stats.deliveryOrders, stats.dineInOrders, stats.takeAwayOrders],
          backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56'],
          borderColor: '#fff',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom' }
        }
      }
    });
  }

  // ===== رسم بياني: أكثر الأصناف مبيعاً =====
  function renderTopItemsChart() {
    const topItems = getTopItems();
    const ctx = document.getElementById('topItemsChart').getContext('2d');
    
    if (topItemsChart) topItemsChart.destroy();
    
    topItemsChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: topItems.map(item => item.name),
        datasets: [{
          label: 'عدد الطلبات',
          data: topItems.map(item => item.count),
          backgroundColor: '#D8482A',
          borderColor: '#B8391F',
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        indexAxis: 'y',
        plugins: {
          legend: { display: false }
        }
      }
    });
  }

  // ===== الحصول على أكثر الأصناف مبيعاً =====
  function getTopItems(limit = 5) {
    const itemCounts = {};
    
    allOrders.forEach(order => {
      const items = order.items.split(',');
      items.forEach(item => {
        const trimmed = item.trim();
        itemCounts[trimmed] = (itemCounts[trimmed] || 0) + 1;
      });
    });
    
    return Object.entries(itemCounts)
      .map(([name, count]) => ({ name, count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, limit);
  }

  // ===== عرض جدول الطلبات =====
  function renderTable() {
    const tbody = document.getElementById('ordersBody');
    let html = '';
    
    allOrders.forEach(order => {
      const badge = `badge-${order.orderType === 'توصيل' ? 'delivery' : order.orderType === 'صالة' ? 'dine-in' : 'takeaway'}`;
      html += `
        <tr>
          <td>${order.notes}</td>
          <td>${order.totalPrice} دينار</td>
          <td>${order.items}</td>
          <td><span class="badge ${badge}">${order.orderType}</span></td>
          <td>${order.area}</td>
          <td>${order.customerPhone}</td>
          <td>${order.customerName}</td>
          <td>${order.timestamp}</td>
        </tr>
      `;
    });
    
    tbody.innerHTML = html || '<tr><td colspan="8" style="text-align: center; color: #999;">لا توجد طلبات</td></tr>';
  }

  // ===== تحديث البيانات =====
  function refreshData() {
    loadData();
  }

  // ===== تحميل CSV =====
  function exportToCSV() {
    let csv = 'الوقت,اسم الزبون,الهاتف,المنطقة,نوع الطلب,الطلبات,المجموع,الملاحظات\n';
    
    allOrders.forEach(order => {
      csv += `"${order.timestamp}","${order.customerName}","${order.customerPhone}","${order.area}","${order.orderType}","${order.items}","${order.totalPrice}","${order.notes}"\n`;
    });
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `orders-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  }

  // ===== تحميل البيانات عند فتح الصفحة =====
  window.addEventListener('load', loadData);
</script>

</body>
</html>
