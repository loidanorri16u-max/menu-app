<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كرنش برجر — القائمة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Tajawal:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-dark:#0C0A09; --panel:#151210; --paper:#FBF8F3; --card:#FFFFFF;
    --flame:#D8482A; --flame-deep:#B8391F; --cheddar:#E8A93D; --blue:#6FA8FF;
    --ink:#221B16; --muted:#8A8078; --line:#EFE9DF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; }
  body{ background:var(--paper); color:var(--ink); font-family:'Tajawal', sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
  ::selection{background:var(--flame); color:#fff;}
  .mono{ font-family:'JetBrains Mono', monospace; direction:ltr; }

  :root {
    --restaurant-name: "كرنش برجر";
    --restaurant-name-en: "Crunch Burger";
    --restaurant-phone: "07731260831";
    --restaurant-logo: "🍔";
    --restaurant-color: "#D8482A";
    --google-maps-link: "https://maps.google.com";
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 28px; color: var(--restaurant-color); }
  .cart-btn { background: var(--restaurant-color); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
  .menu-item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid var(--restaurant-color); }
  .menu-item h3 { color: var(--restaurant-color); margin-bottom: 5px; }
  .menu-item .price { font-weight: bold; color: var(--cheddar); font-size: 18px; }
  .add-btn { background: var(--restaurant-color); color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; }

  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
  .modal.show { display: flex; align-items: center; justify-content: center; }
  .modal-content { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
  .modal-content h2 { margin-bottom: 20px; color: var(--restaurant-color); }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .submit-btn { background: var(--restaurant-color); color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
  .submit-btn:hover { opacity: 0.9; }

  .success-message { background: #4CAF50; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; display: none; }
  .success-message.show { display: block; }

  .cart-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .cart-table th, .cart-table td { padding: 10px; text-align: right; border-bottom: 1px solid #ddd; }
  .cart-table th { background: var(--restaurant-color); color: white; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1><span id="restaurant-logo">🍔</span> <span id="restaurant-name">كرنش برجر</span></h1>
      <p id="restaurant-subtitle">اختر وجبتك المفضلة</p>
    </div>
    <div>
      <button class="cart-btn" onclick="openCheckout()">🛒 السلة (<span id="cart-count">0</span>)</button>
      <a href="#" id="maps-link" style="margin-left: 10px; text-decoration: none;">
        <button class="cart-btn" style="background: #4285F4;">📍 الاتجاهات</button>
      </a>
    </div>
  </div>

  <div id="menu-container"></div>
</div>

<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <h2>تأكيد الطلب</h2>
    
    <div class="success-message" id="successMessage">
      ✅ تم إرسال الطلب بنجاح!
    </div>

    <table class="cart-table" id="cartTable">
      <thead>
        <tr>
          <th>السعر</th>
          <th>الكمية</th>
          <th>الصنف</th>
        </tr>
      </thead>
      <tbody id="cartBody"></tbody>
    </table>

    <div style="text-align: left; font-weight: bold; font-size: 18px; margin-bottom: 20px;">
      المجموع: <span id="totalPrice">0</span> دينار
    </div>

    <form id="orderForm">
      <div class="form-group">
        <label for="customerName">اسمك *</label>
        <input type="text" id="customerName" required>
      </div>

      <div class="form-group">
        <label for="customerPhone">رقم الهاتف *</label>
        <input type="tel" id="customerPhone" required>
      </div>

      <div class="form-group">
        <label for="orderType">نوع الطلب *</label>
        <select id="orderType" required onchange="toggleDeliveryAddress()">
          <option value="">-- اختر نوع الطلب --</option>
          <option value="صالة">داخل المطعم (صالة)</option>
          <option value="توصيل">توصيل</option>
          <option value="سفري">سفري (استلام من الباب)</option>
        </select>
      </div>

      <div class="form-group" id="areaGroup" style="display: none;">
        <label for="area">المنطقة *</label>
        <input type="text" id="area" placeholder="مثال: الرصافة، الكرخ">
      </div>

      <div class="form-group">
        <label for="notes">ملاحظات إضافية</label>
        <textarea id="notes" placeholder="مثال: بدون خس، بدون طماطم، إضافة صلصة..."></textarea>
      </div>

      <button type="button" class="submit-btn" onclick="submitOrder()">📱 إرسال عبر واتساب</button>
      <button type="button" class="submit-btn" style="background: #999; margin-top: 10px;" onclick="closeCheckout()">إلغاء</button>
    </form>
  </div>
</div>

<script>
  const RESTAURANT_CONFIG = {
    name: "كرنش برجر",
    nameEn: "Crunch Burger",
    phone: "07731260831",
    logo: "🍔",
    color: "#D8482A",
    googleMapsLink: "https://maps.google.com",
    webhookUrl: "https://script.google.com/macros/s/AKfycbyNEeEzUcPgbm19YI6_1GHFX1jq_z5J6X7jviEgxmVRex0An68m0t60f4lgPsTUpSDsLQ/exec",
  };

  const MENU_DATA = [
    { id: 1, category: "برجرات", name: "برجر كلاسيكي", price: 25, description: "لحم، خس، طماطم، جبن" },
    { id: 2, category: "برجرات", name: "برجر مشروم", price: 28, description: "لحم، مشروم، جبن موتزاريلا" },
    { id: 3, category: "برجرات", name: "برجر دجاج", price: 22, description: "دجاج مشوي، خس، طماطم" },
    { id: 4, category: "أطباق جانبية", name: "بطاطس مقلية", price: 8, description: "بطاطس مقلية طازة مع ملح" },
    { id: 5, category: "أطباق جانبية", name: "ناجتس الدجاج", price: 12, description: "قطع دجاج مقلية ذهبية" },
    { id: 6, category: "مشروبات", name: "كوكا كولا", price: 5, description: "مشروب غازي بارد" },
    { id: 7, category: "مشروبات", name: "عصير برتقال", price: 6, description: "عصير برتقال طازة" },
  ];

  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  function initPage() {
    document.getElementById('restaurant-name').textContent = RESTAURANT_CONFIG.name;
    document.getElementById('restaurant-logo').textContent = RESTAURANT_CONFIG.logo;
    document.getElementById('maps-link').href = RESTAURANT_CONFIG.googleMapsLink;
    renderMenu();
    updateCartCount();
    logPageView();
  }

  function renderMenu() {
    const container = document.getElementById('menu-container');
    const categories = [...new Set(MENU_DATA.map(item => item.category))];
    let html = '';
    categories.forEach(category => {
      html += `<h2 style="color: <LaTex>${RESTAURANT_CONFIG.color}; margin-top: 30px; margin-bottom: 15px;">$</LaTex>{category}</h2>`;
      const items = MENU_DATA.filter(item => item.category === category);
      items.forEach(item => {
        html += `
          <div class="menu-item">
            <h3><LaTex>${item.name}</h3>
            <p>$</LaTex>{item.description}</p>
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span class="price"><LaTex>${item.price} دينار</span>
              <button class="add-btn" onclick="addToCart($</LaTex>{item.id}, '<LaTex>${item.name}', $</LaTex>{item.price})">أضف</button>
            </div>
          </div>
        `;
      });
    });
    container.innerHTML = html;
  }

  function addToCart(id, name, price) {
    const existing = cart.find(item => item.id === id);
    if (existing) {
      existing.quantity++;
    } else {
      cart.push({ id, name, price, quantity: 1 });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    showNotification(`تم إضافة ${name} للسلة`);
  }

  function updateCartCount() {
    const count = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.getElementById('cart-count').textContent = count;
  }

  function openCheckout() {
    if (cart.length === 0) {
      showNotification('السلة فارغة!');
      return;
    }
    renderCartTable();
    document.getElementById('checkoutModal').classList.add('show');
  }

  function closeCheckout() {
    document.getElementById('checkoutModal').classList.remove('show');
  }

  function renderCartTable() {
    const tbody = document.getElementById('cartBody');
    let html = '';
    let total = 0;
    cart.forEach(item => {
      const subtotal = item.price * item.quantity;
      total += subtotal;
      html += `
        <tr>
          <td>${subtotal}</td>
          <td><LaTex>${item.quantity}</td>
          <td>$</LaTex>{item.name}</td>
        </tr>
      `;
    });
    tbody.innerHTML = html;
    document.getElementById('totalPrice').textContent = total;
  }

  function toggleDeliveryAddress() {
    const orderType = document.getElementById('orderType').value;
    const areaGroup = document.getElementById('areaGroup');
    areaGroup.style.display = orderType === 'توصيل' ? 'block' : 'none';
  }

  async function submitOrder() {
    const name = document.getElementById('customerName').value.trim();
    const phone = document.getElementById('customerPhone').value.trim();
    const orderType = document.getElementById('orderType').value;
    const area = document.getElementById('area').value.trim();
    const notes = document.getElementById('notes').value.trim();

    if (!name || !phone || !orderType) {
      showNotification('يرجى ملء جميع الحقول المطلوبة');
      return;
    }

    if (orderType === 'توصيل' && !area) {
      showNotification('يرجى إدخال المنطقة للتوصيل');
      return;
    }

    const orderData = {
      timestamp: new Date().toISOString(),
      restaurantName: RESTAURANT_CONFIG.name,
      customerName: name,
      customerPhone: phone,
      orderType: orderType,
      area: area || '-',
      items: cart.map(item => `<LaTex>${item.name} × $</LaTex>{item.quantity}`).join(', '),
      totalPrice: cart.reduce((sum, item) => sum + item.price * item.quantity, 0),
      notes: notes || '-',
    };

    try {
      await fetch(RESTAURANT_CONFIG.webhookUrl, {
        method: 'POST',
        body: JSON.stringify(orderData),
      });
    } catch (error) {
      console.warn('تنبيه: لم يتمكن من حفظ الطلب في الجدول');
    }

    const whatsappMessage = formatWhatsAppMessage(orderData);
    const whatsappUrl = `https://wa.me/<LaTex>${RESTAURANT_CONFIG.phone.replace('+', '')}?text=$</LaTex>{encodeURIComponent(whatsappMessage)}`;
    window.open(whatsappUrl, '_blank');

    cart = [];
    localStorage.removeItem('cart');
    document.getElementById('orderForm').reset();
    document.getElementById('areaGroup').style.display = 'none';
    updateCartCount();

    document.getElementById('successMessage').classList.add('show');
    setTimeout(() => {
      document.getElementById('successMessage').classList.remove('show');
      closeCheckout();
    }, 2000);
  }

  function formatWhatsAppMessage(orderData) {
    return `
🧾 *طلب جديد من <LaTex>${RESTAURANT_CONFIG.name}*

👤 *الاسم:* $</LaTex>{orderData.customerName}
📱 *الهاتف:* <LaTex>${orderData.customerPhone}
📦 *نوع الطلب:* $</LaTex>{orderData.orderType}
<LaTex>${orderData.orderType === 'توصيل' ? `📍 *المنطقة:* $</LaTex>{orderData.area}` : ''}

🛒 *الطلبية:*
<LaTex>${cart.map(item => `• $</LaTex>{item.name} × <LaTex>${item.quantity} = $</LaTex>{item.price * item.quantity} دينار`).join('\n')}

💰 *المجموع:* <LaTex>${orderData.totalPrice} دينار

$</LaTex>{orderData.notes !== '-' ? `📝 *ملاحظات:* <LaTex>${orderData.notes}` : ''}

⏰ *الوقت:* $</LaTex>{new Date().toLocaleString('ar-IQ')}
    `.trim();
  }

  function showNotification(message) {
    alert(message);
  }

  function logPageView() {
    const visitData = {
      timestamp: new Date().toISOString(),
      restaurantName: RESTAURANT_CONFIG.name,
      eventType: 'page_view',
      userAgent: navigator.userAgent,
    };

    fetch(RESTAURANT_CONFIG.webhookUrl, {
      method: 'POST',
      body: JSON.stringify(visitData),
    }).catch(() => {});
  }

  window.addEventListener('load', initPage);

  document.getElementById('checkoutModal').addEventListener('click', function(e) {
    if (e.target === this) closeCheckout();
  });
</script>

</body>
</html>
